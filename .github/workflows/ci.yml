name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use defaults for CI to avoid needing .env file
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: testpassword123

jobs:
  # ============================================
  # Rust Jobs
  # ============================================
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            actor
            web
      # On PRs: auto-fix and commit. On push to main: just check.
      - name: Format code (engine)
        run: cargo fmt --all --manifest-path engine/Cargo.toml
      - name: Format code (actor)
        run: cargo fmt --manifest-path actor/Cargo.toml
      - name: Format code (web)
        run: cargo fmt --manifest-path web/Cargo.toml
      - name: Commit formatting fixes
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix Rust formatting"
          file_pattern: "*.rs"

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            actor
            web
      - name: Clippy (engine)
        run: cargo clippy --manifest-path engine/Cargo.toml --all-targets -- -D warnings
      - name: Clippy (actor)
        run: cargo clippy --manifest-path actor/Cargo.toml --all-targets -- -D warnings
      - name: Clippy (web)
        run: cargo clippy --manifest-path web/Cargo.toml --all-targets -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            actor
            web
      - name: Test engine
        run: cargo test --manifest-path engine/Cargo.toml
      - name: Test actor
        run: cargo test --manifest-path actor/Cargo.toml
      - name: Test web
        run: cargo test --manifest-path web/Cargo.toml

  rust-build:
    name: Rust Build (Release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            actor
            web
      - name: Build engine
        run: cargo build --release --manifest-path engine/Cargo.toml
      - name: Build actor
        run: cargo build --release --manifest-path actor/Cargo.toml
      - name: Build web
        run: cargo build --release --manifest-path web/Cargo.toml

  rust-security-audit:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine
            actor
            web
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit (engine)
        run: cargo audit --manifest-path engine/Cargo.toml
        continue-on-error: true
      - name: Run cargo audit (actor)
        run: cargo audit --manifest-path actor/Cargo.toml
        continue-on-error: true
      - name: Run cargo audit (web)
        run: cargo audit --manifest-path web/Cargo.toml
        continue-on-error: true

  # ============================================
  # Python Jobs (Trainer)
  # ============================================
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trainer
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: trainer/pyproject.toml
      - name: Install linters
        run: pip install ruff black
      # Auto-fix linting issues
      - name: Ruff fix
        run: ruff check --fix src/
      - name: Black format
        run: black src/
      - name: Commit lint fixes
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix Python formatting"
          file_pattern: "trainer/**/*.py"

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trainer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: trainer/pyproject.toml
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest

  python-security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trainer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: trainer/pyproject.toml
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit
        continue-on-error: true

  # ============================================
  # Frontend Jobs (Svelte/TypeScript)
  # ============================================
  frontend:
    name: Frontend Build & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit
        continue-on-error: true
      - name: Svelte check (TypeScript)
        run: npm run check
      - name: Build
        run: npm run build

  # ============================================
  # Docker Build Validation
  # ============================================
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build AlphaZero image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.alphazero
          push: false
          tags: cartridge-alphazero:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./web/Dockerfile
          push: false
          tags: cartridge-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./web/frontend
          file: ./web/frontend/Dockerfile
          push: false
          tags: cartridge-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Secrets Scanning
  # ============================================
  secrets-scan:
    name: Secrets Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
